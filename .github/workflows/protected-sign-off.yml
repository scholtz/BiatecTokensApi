name: Protected Strict Sign-Off

# ─────────────────────────────────────────────────────────────────────────────
# Protected Strict Sign-Off Workflow
#
# This workflow operationalizes the protected strict backend sign-off as a
# repeatable, fail-closed release gate.  It is the canonical source of
# business-owner-quality evidence that Biatec's wallet-free, backend-managed
# issuance journey works under production-like conditions.
#
# TWO-TIER DESIGN:
#
#   Tier 1 — `build-and-test` job (push to master/main):
#     Runs on every merge without requiring the protected environment or secrets.
#     Builds the solution and runs all ProtectedSignOff unit/integration tests.
#     Produces a CI summary with a link to trigger a full protected run.
#     Never fails due to missing secrets — only fails on build or test errors.
#
#   Tier 2 — `protected-sign-off-run` job (workflow_dispatch only):
#     Requires the `protected-sign-off` GitHub environment with required-reviewer
#     approval and the two mandatory secrets.
#     Runs the full evidence collection: environment check, fixture provisioning,
#     lifecycle verification, and diagnostics against a live backend instance.
#     Produces an artifact-backed evidence manifest for product-owner sign-off.
#     Fails loudly with actionable diagnostics when secrets or backend are missing.
#
# Prerequisites for Tier 2 (GitHub environment secrets):
#   • PROTECTED_SIGN_OFF_JWT_SECRET  — JWT signing key (≥ 32 characters)
#   • PROTECTED_SIGN_OFF_APP_ACCOUNT — Algorand account mnemonic (25 words)
#
# See PROTECTED_SIGN_OFF_RUNBOOK.md for full setup and operator guidance.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      correlation_id:
        description: 'Correlation ID for this protected run (used in artifact names and logs)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — validate prerequisites and build only; skip endpoint calls'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read
  checks: write
  actions: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Tier 1: Build-and-test job — runs on every push, no protected environment
  #
  # This job ensures the protected sign-off test suite stays green on every
  # merge without requiring the protected-sign-off environment or its secrets.
  # It does NOT perform live endpoint calls; that requires Tier 2.
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: Build and run protected sign-off tests
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BiatecTokensApi.sln

      - name: Build solution
        run: dotnet build BiatecTokensApi.sln --configuration Release --no-restore

      - name: Run protected sign-off tests
        env:
          # TEST-ONLY keys for CI execution — never use in production environments
          #
          # NOTE: JwtConfig__SecretKey is intentionally NOT set here.
          # The integration tests use WebApplicationFactory with their own in-memory
          # JWT configuration.  Setting JwtConfig__SecretKey as an env var causes a
          # key-mismatch between the startup-snapshot used for JWT validation and the
          # IOptions<JwtConfig> live binding used by AuthenticationService — resulting
          # in 401 Unauthorized for every authenticated test request.
          # Each factory sets its own JwtConfig:SecretKey via AddInMemoryCollection.
          #
          # NOTE: ProtectedSignOff__EnforceConfigGuards is intentionally NOT set here.
          # Setting it to "false" suppresses CheckWorkflowGovernanceConfig(), causing the
          # Evidence Integrity (EI) tests to fail because they assert that the
          # WorkflowGovernanceEnabled check is present in every environment-check response.
          # The factory-level JwtConfig and App:Account settings keep the service healthy.
          App__Account: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"
          KeyManagementConfig__Provider: "Hardcoded"
          KeyManagementConfig__HardcodedKey: "CIPushTestKeyMinimum32CharsPaddingXXXX"
          ProtectedSignOff__EnvironmentLabel: "ci-push"
        run: |
          dotnet test BiatecTokensTests/BiatecTokensTests.csproj \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName~ProtectedSignOff" \
            --logger "trx;LogFileName=protected-sign-off-tests.trx" \
            --results-directory ./ProtectedSignOffResults \
            --verbosity normal \
            --blame-hang-timeout 60s

      - name: Sanitize test results
        if: always()
        run: |
          python3 - <<'PY'
          import glob, os, xml.etree.ElementTree as ET
          for path in glob.glob('**/protected-sign-off-tests.trx', recursive=True):
              tree = ET.parse(path)
              for parent in tree.getroot().iter():
                  for child in list(parent):
                      if child.tag.endswith('Output'):
                          parent.remove(child)
              out = os.path.join(os.path.dirname(path), 'protected-sign-off-tests-sanitized.trx')
              tree.write(out, encoding='utf-8', xml_declaration=True)
              print(f"Sanitized {path} -> {out}")
          PY

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        # continue-on-error is required: the action tries to post a PR comment, which fails
        # with 403 "Resource not accessible by integration" when triggered by copilot agents
        # or other restricted actors.  The test run itself has already passed or failed — the
        # publish step is informational only and must not gate the overall job outcome.
        continue-on-error: true
        with:
          files: '**/protected-sign-off-tests-sanitized.trx'
          check_name: 'Protected Sign-Off Tests (push)'

      - name: Produce summary
        if: always()
        run: |
          echo "## 🔐 Protected Sign-Off — Build and Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Solution built and ProtectedSignOff tests run." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ **This is a permissive developer-feedback run — NOT release-grade evidence.**" >> "$GITHUB_STEP_SUMMARY"
          echo "> It confirms the test suite is green but does NOT prove the live backend issuance" >> "$GITHUB_STEP_SUMMARY"
          echo "> lifecycle under protected secrets.  Only a Tier 2 \`workflow_dispatch\` run against" >> "$GITHUB_STEP_SUMMARY"
          echo "> the \`protected-sign-off\` environment with validated real secrets produces evidence" >> "$GITHUB_STEP_SUMMARY"
          echo "> whose \`isReleaseGradeEvidence\` manifest field is \`true\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "To run the **full** protected evidence collection (Tier 2), trigger" >> "$GITHUB_STEP_SUMMARY"
          echo "**workflow_dispatch** from the Actions tab after configuring the" >> "$GITHUB_STEP_SUMMARY"
          echo "\`protected-sign-off\` GitHub environment with the required secrets." >> "$GITHUB_STEP_SUMMARY"
          echo "See [PROTECTED_SIGN_OFF_RUNBOOK.md](./PROTECTED_SIGN_OFF_RUNBOOK.md)." >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # Tier 2: Protected strict sign-off run — workflow_dispatch only
  #
  # The entire job runs under `environment: protected-sign-off` so that:
  #   • Secrets stored in the environment (not just at the repo level) are
  #     accessible from the very first step.
  #   • Required-reviewer approval gates apply before any secret is consumed.
  #   • The prerequisite check happens inside the environment boundary, not
  #     in a separate pre-environment job that can never see environment secrets.
  # ═══════════════════════════════════════════════════════════════════════════
  protected-sign-off-run:
    name: Protected strict sign-off run
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: protected-sign-off
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ── Step 0: Validate prerequisites (fail-closed) ────────────────────────
      # This step runs inside the `protected-sign-off` environment, so both
      # repository-level and environment-level secrets are resolvable.
      # Reviewer-gated environments are approved before this job starts, meaning
      # the prerequisite check happens after any required human approval.
      - name: Validate prerequisites and set correlation ID
        id: setup
        env:
          JWT_SECRET: ${{ secrets.PROTECTED_SIGN_OFF_JWT_SECRET }}
          APP_ACCOUNT: ${{ secrets.PROTECTED_SIGN_OFF_APP_ACCOUNT }}
        run: |
          set -euo pipefail
          MISSING=()
          MALFORMED=()

          # ── Presence checks ───────────────────────────────────────────────
          if [ -z "$JWT_SECRET" ]; then
            MISSING+=("PROTECTED_SIGN_OFF_JWT_SECRET (JWT signing key ≥ 32 characters)")
          fi
          if [ -z "$APP_ACCOUNT" ]; then
            MISSING+=("PROTECTED_SIGN_OFF_APP_ACCOUNT (Algorand account mnemonic, 25 words)")
          fi

          # ── Sanity checks (only when secrets are present) ─────────────────
          # Check JWT secret length — must be ≥ 32 characters for HS256 security
          # Note: we do NOT log the actual length to avoid leaking secret characteristics.
          if [ -n "$JWT_SECRET" ]; then
            JWT_LEN=${#JWT_SECRET}
            if [ "$JWT_LEN" -lt 32 ]; then
              MALFORMED+=("PROTECTED_SIGN_OFF_JWT_SECRET is shorter than 32 characters; must be ≥ 32 characters for HS256 key strength")
            fi
          fi

          # Check APP_ACCOUNT is a 25-word Algorand mnemonic
          if [ -n "$APP_ACCOUNT" ]; then
            WORD_COUNT=0
            for _w in $APP_ACCOUNT; do WORD_COUNT=$((WORD_COUNT + 1)); done
            if [ "$WORD_COUNT" -ne 25 ]; then
              MALFORMED+=("PROTECTED_SIGN_OFF_APP_ACCOUNT does not have exactly 25 words; Algorand mnemonics must be exactly 25 words")
            fi
          fi

          # ── Emit diagnostics and fail if any checks failed ─────────────────
          FAIL=0
          if [ ${#MISSING[@]} -gt 0 ] || [ ${#MALFORMED[@]} -gt 0 ]; then
            echo "## ❌ Protected Run Prerequisites Not Met" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Secrets must be set in the **protected-sign-off** GitHub environment" >> "$GITHUB_STEP_SUMMARY"
            echo "(Settings → Environments).  Each secret must pass both presence and sanity checks." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ ${#MISSING[@]} -gt 0 ]; then
              echo "### Missing secrets" >> "$GITHUB_STEP_SUMMARY"
              for M in "${MISSING[@]}"; do
                echo "- ❌ \`$M\`" >> "$GITHUB_STEP_SUMMARY"
              done
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ ${#MALFORMED[@]} -gt 0 ]; then
              echo "### Malformed secrets (present but invalid)" >> "$GITHUB_STEP_SUMMARY"
              for B in "${MALFORMED[@]}"; do
                echo "- ❌ $B" >> "$GITHUB_STEP_SUMMARY"
              done
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "See [PROTECTED_SIGN_OFF_RUNBOOK.md](./PROTECTED_SIGN_OFF_RUNBOOK.md) §Required Secrets for setup instructions." >> "$GITHUB_STEP_SUMMARY"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi

          CORR="${{ github.event.inputs.correlation_id }}"
          if [ -z "$CORR" ]; then
            CORR="protected-run-${{ github.run_id }}-${{ github.run_attempt }}"
          fi
          echo "correlation_id=$CORR" >> "$GITHUB_OUTPUT"
          echo "✅ Prerequisites validated (presence + sanity).  Correlation ID: $CORR"

      # ── Step 0b: Emit blocked evidence manifest on prerequisite failure ──────
      # When Step 0 fails (secrets missing or malformed), this step creates a
      # fail-closed "blocked" evidence manifest in ./ProtectedRunEvidence/ so that
      # reviewers downloading the artifact can immediately understand WHY the run
      # did not proceed to evidence collection and what must be configured.
      #
      # This ensures the workflow ALWAYS uploads an artifact — a key requirement for
      # fail-closed release-governance semantics.  A reviewer must never have to
      # re-run the workflow or read logs just to discover the run was blocked.
      - name: Create blocked evidence manifest (prerequisite failure)
        if: failure() && steps.setup.conclusion == 'failure'
        run: |
          mkdir -p ./ProtectedRunEvidence
          FALLBACK_CORR="blocked-${{ github.run_id }}-${{ github.run_attempt }}"
          RUN_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > ./ProtectedRunEvidence/00_evidence_manifest.json << 'MANIFEST_EOF'
          {
            "schemaVersion": "2.0",
            "isReleaseGradeEvidence": false,
            "blocked": true,
            "blockedReason": "Prerequisite validation failed — required secrets are missing or malformed in the protected-sign-off environment. This run did not reach evidence collection. See 00_BLOCKED.txt for remediation steps.",
            "blockedAt": "Step 0 — Validate prerequisites and set correlation ID",
            "releaseGradeNote": "isReleaseGradeEvidence is true only when lifecycle verification and environment readiness are confirmed under the protected-sign-off environment with valid secrets. Configure the required secrets and re-run.",
            "remediationUrl": "PROTECTED_SIGN_OFF_RUNBOOK.md §Required Secrets",
            "results": null
          }
          MANIFEST_EOF
          # Patch in the dynamic fields that cannot be in the heredoc literal
          python3 - "$FALLBACK_CORR" "$RUN_AT" \
            "${{ github.run_id }}" "${{ github.run_attempt }}" \
            "${{ github.sha }}" "${{ github.ref }}" "${{ github.actor }}" << 'PY_EOF'
          import sys, json
          corr, run_at, run_id, run_attempt, sha, ref, actor = sys.argv[1:]
          with open('./ProtectedRunEvidence/00_evidence_manifest.json') as f:
              d = json.load(f)
          d['correlationId'] = corr
          d['runAt'] = run_at
          d['runId'] = run_id
          d['runAttempt'] = run_attempt
          d['sha'] = sha
          d['ref'] = ref
          d['actor'] = actor
          d['environmentLabel'] = 'protected-ci'
          with open('./ProtectedRunEvidence/00_evidence_manifest.json', 'w') as f:
              json.dump(d, f, indent=2)
          print("Patched dynamic fields into blocked manifest")
          PY_EOF
          cat > ./ProtectedRunEvidence/00_BLOCKED.txt << BLOCKED_EOF
          PROTECTED SIGN-OFF RUN — BLOCKED AT PREREQUISITES
          ==================================================

          This run was blocked at Step 0 (Validate prerequisites) because one or more
          required secrets are missing or malformed in the protected-sign-off environment.

          isReleaseGradeEvidence: false
          blocked: true

          Required secrets (set in: Settings -> Environments -> protected-sign-off):
            * PROTECTED_SIGN_OFF_JWT_SECRET  — JWT signing key, must be >= 32 characters
            * PROTECTED_SIGN_OFF_APP_ACCOUNT — Algorand mnemonic, exactly 25 words

          See PROTECTED_SIGN_OFF_RUNBOOK.md §Required Secrets for setup instructions.
          BLOCKED_EOF
          echo "✅ Blocked evidence manifest written to ./ProtectedRunEvidence/"
          echo "   (isReleaseGradeEvidence: false, blocked: true)"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BiatecTokensApi.sln

      - name: Build solution
        run: dotnet build BiatecTokensApi.sln --configuration Release --no-restore

      # ── Step A: Protected sign-off tests with real secrets ──────────────────
      # Runs all ProtectedSignOff tests against a WebApplicationFactory-hosted
      # server.  The factories configure their own JWT secrets via in-memory
      # config, so JwtConfig__SecretKey is intentionally NOT injected here
      # (injecting it causes a key-mismatch between the startup snapshot used for
      # JWT bearer validation and the IOptions<JwtConfig> live binding used by
      # AuthenticationService, producing 401 Unauthorized on all protected calls).
      #
      # App__Account and KeyManagementConfig are passed so the server can derive
      # ARC76 addresses; governance evidence is observed from runtime config, not
      # asserted by the workflow.
      - name: Run protected sign-off tests (real secrets, observed governance)
        if: github.event.inputs.dry_run != 'true'
        env:
          App__Account: ${{ secrets.PROTECTED_SIGN_OFF_APP_ACCOUNT }}
          KeyManagementConfig__Provider: "Hardcoded"
          KeyManagementConfig__HardcodedKey: "ProtectedCIKeyMinimum32CharsPaddingXXXX"
          ProtectedSignOff__EnvironmentLabel: "protected-ci"
        run: |
          dotnet test BiatecTokensTests/BiatecTokensTests.csproj \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName~ProtectedSignOff" \
            --logger "trx;LogFileName=protected-sign-off-tests.trx" \
            --results-directory ./ProtectedSignOffResults \
            --verbosity normal \
            --blame-hang-timeout 60s

      # ── Step B: Start backend with protected configuration ──────────────────
      # Only the required secrets are injected.  Governance configuration comes
      # from the application's own appsettings.json so that the environment check
      # endpoint reports the real configured state rather than a workflow-asserted
      # value.
      - name: Start backend with protected configuration
        if: github.event.inputs.dry_run != 'true'
        env:
          JwtConfig__SecretKey: ${{ secrets.PROTECTED_SIGN_OFF_JWT_SECRET }}
          App__Account: ${{ secrets.PROTECTED_SIGN_OFF_APP_ACCOUNT }}
          ASPNETCORE_URLS: "http://localhost:7100"
          ASPNETCORE_ENVIRONMENT: "Development"
          AlgorandAuthentication__CheckExpiration: "false"
          AlgorandAuthentication__Debug: "true"
          AlgorandAuthentication__EmptySuccessOnFailure: "true"
          AlgorandAuthentication__Realm: "BiatecTokens#ARC14"
          KeyManagementConfig__Provider: "Hardcoded"
          KeyManagementConfig__HardcodedKey: "ProtectedCIKeyMinimum32CharsPaddingXX"
          ProtectedSignOff__EnvironmentLabel: "protected-ci"
          DeploymentEvidenceConfig__Provider: "Simulation"
        run: |
          dotnet run \
            --project BiatecTokensApi/BiatecTokensApi.csproj \
            --configuration Release \
            --no-build \
            &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> "$GITHUB_ENV"

          echo "Waiting for backend to become healthy..."
          HEALTHY=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7100/health > /dev/null 2>&1 \
               || curl -sf http://localhost:7100/swagger/v1/swagger.json > /dev/null 2>&1; then
              echo "✅ Backend started after ${i} attempt(s)"
              HEALTHY=true
              break
            fi
            sleep 3
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "❌ Backend did not start within the timeout"
            kill "$BACKEND_PID" 2>/dev/null || true
            exit 1
          fi

      # ── Step C: Obtain JWT token via register/login ─────────────────────────
      - name: Obtain JWT token for protected endpoints
        if: github.event.inputs.dry_run != 'true'
        id: jwt
        run: |
          UNIQUE_EMAIL="protected-ci-${{ steps.setup.outputs.correlation_id }}@biatec-sign-off.example.com"
          echo "Registering protected sign-off user: $UNIQUE_EMAIL"

          REG_RESPONSE=$(curl -sf \
            -X POST http://localhost:7100/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d "{
              \"email\": \"$UNIQUE_EMAIL\",
              \"password\": \"ProtectedSignOff!2026\",
              \"confirmPassword\": \"ProtectedSignOff!2026\",
              \"fullName\": \"Protected CI Sign-Off User\"
            }" 2>&1) || {
              echo "❌ Registration failed: $REG_RESPONSE"
              exit 1
            }

          ACCESS_TOKEN=$(echo "$REG_RESPONSE" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('accessToken',''))" 2>/dev/null || true)

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Could not extract access token from registration response."
            echo "  Hint: Verify that the backend started successfully, the registration endpoint"
            echo "  is accessible at http://localhost:7100/api/v1/auth/register, and the response"
            echo "  contains an 'accessToken' field. Check the backend startup logs above for errors."
            echo "Response body: $REG_RESPONSE"
            exit 1
          fi

          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "✅ JWT token obtained"

      # ── Step D: Call the four protected sign-off endpoints ──────────────────
      - name: Execute protected sign-off evidence collection
        if: github.event.inputs.dry_run != 'true'
        id: evidence
        run: |
          mkdir -p ./ProtectedRunEvidence
          JWT="${{ steps.jwt.outputs.access_token }}"
          BASE="http://localhost:7100/api/v1/protected-sign-off"
          CORR="${{ steps.setup.outputs.correlation_id }}"
          RUN_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "Collecting protected sign-off evidence..."
          echo "  Correlation ID : $CORR"
          echo "  Run timestamp  : $RUN_AT"

          # ── 1. Environment Check ──────────────────────────────────────────
          ENV_RESP=$(curl -sf \
            -X POST "$BASE/environment/check" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"correlationId\":\"$CORR\",\"includeConfigCheck\":true,\"includeFixtureCheck\":true,\"includeObservabilityCheck\":true}" \
            2>&1) || { echo "❌ Environment check call failed: $ENV_RESP"; exit 1; }

          echo "$ENV_RESP" | python3 -m json.tool > ./ProtectedRunEvidence/01_environment_check.json 2>/dev/null \
            || echo "$ENV_RESP" > ./ProtectedRunEvidence/01_environment_check.json

          ENV_STATUS=$(echo "$ENV_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          ENV_READY=$(echo "$ENV_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(str(d.get('isReadyForProtectedRun',False)).lower())" 2>/dev/null || echo "false")

          echo "  Environment status : $ENV_STATUS"
          echo "  Ready for run      : $ENV_READY"
          echo "env_status=$ENV_STATUS" >> "$GITHUB_OUTPUT"
          echo "env_ready=$ENV_READY" >> "$GITHUB_OUTPUT"

          # ── 2. Fixture Provisioning ───────────────────────────────────────
          FIXTURE_RESP=$(curl -sf \
            -X POST "$BASE/fixtures/provision" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"correlationId\":\"$CORR\",\"resetIfExists\":false}" \
            2>&1) || { echo "❌ Fixture provisioning call failed: $FIXTURE_RESP"; exit 1; }

          echo "$FIXTURE_RESP" | python3 -m json.tool > ./ProtectedRunEvidence/02_fixture_provision.json 2>/dev/null \
            || echo "$FIXTURE_RESP" > ./ProtectedRunEvidence/02_fixture_provision.json

          FIXTURE_OK=$(echo "$FIXTURE_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(str(d.get('isProvisioned',False)).lower())" 2>/dev/null || echo "false")
          echo "  Fixtures provisioned : $FIXTURE_OK"
          echo "fixture_ok=$FIXTURE_OK" >> "$GITHUB_OUTPUT"

          # ── 3. Lifecycle Execution ────────────────────────────────────────
          LIFECYCLE_RESP=$(curl -sf \
            -X POST "$BASE/lifecycle/execute" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"correlationId\":\"$CORR\"}" \
            2>&1) || { echo "❌ Lifecycle execution call failed: $LIFECYCLE_RESP"; exit 1; }

          echo "$LIFECYCLE_RESP" | python3 -m json.tool > ./ProtectedRunEvidence/03_lifecycle_execute.json 2>/dev/null \
            || echo "$LIFECYCLE_RESP" > ./ProtectedRunEvidence/03_lifecycle_execute.json

          LIFECYCLE_OK=$(echo "$LIFECYCLE_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(str(d.get('isLifecycleVerified',False)).lower())" 2>/dev/null || echo "false")
          REACHED_STAGE=$(echo "$LIFECYCLE_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('reachedStage','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")

          echo "  Lifecycle verified : $LIFECYCLE_OK"
          echo "  Reached stage      : $REACHED_STAGE"
          echo "lifecycle_ok=$LIFECYCLE_OK" >> "$GITHUB_OUTPUT"
          echo "reached_stage=$REACHED_STAGE" >> "$GITHUB_OUTPUT"

          # ── 4. Diagnostics ────────────────────────────────────────────────
          DIAG_RESP=$(curl -sf \
            "$BASE/diagnostics?correlationId=$CORR" \
            -H "Authorization: Bearer $JWT" \
            2>&1) || { echo "❌ Diagnostics call failed: $DIAG_RESP"; exit 1; }

          echo "$DIAG_RESP" | python3 -m json.tool > ./ProtectedRunEvidence/04_diagnostics.json 2>/dev/null \
            || echo "$DIAG_RESP" > ./ProtectedRunEvidence/04_diagnostics.json

          DIAG_OK=$(echo "$DIAG_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(str(d.get('isOperational',False)).lower())" 2>/dev/null || echo "false")
          echo "  Diagnostics operational : $DIAG_OK"
          echo "diag_ok=$DIAG_OK" >> "$GITHUB_OUTPUT"

          # ── 5. Compliance workflow validation ─────────────────────────────
          # Validate that the compliance APIs aligned with the enterprise onboarding
          # workflow are accessible and returning structured responses.  The protected
          # sign-off must prove that KYC/AML sign-off evidence and compliance case
          # management endpoints exist and do not crash on authenticated requests.
          # Fail-closed: any 404 or 500 response from these endpoints blocks the run.

          # 5a. KYC/AML sign-off endpoint reachability
          KYC_RESP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://localhost:7100/api/v1/kyc-aml-signoff/initiate" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"subjectId\":\"protected-ci-$CORR\",\"executionMode\":\"Simulated\",\"correlationId\":\"$CORR\"}" \
            2>&1) || KYC_RESP_CODE="000"

          KYC_AVAILABLE="false"
          if [ "$KYC_RESP_CODE" = "200" ] || [ "$KYC_RESP_CODE" = "400" ]; then
            KYC_AVAILABLE="true"
          fi
          echo "  KYC/AML sign-off endpoint HTTP status : $KYC_RESP_CODE (available=$KYC_AVAILABLE)"
          echo "kyc_available=$KYC_AVAILABLE" >> "$GITHUB_OUTPUT"

          if [ "$KYC_RESP_CODE" = "404" ] || [ "$KYC_RESP_CODE" = "500" ] || [ "$KYC_RESP_CODE" = "000" ]; then
            echo "❌ KYC/AML sign-off endpoint is unavailable (HTTP $KYC_RESP_CODE). Expected 200 or 400."
            echo "  Hint: Verify that IKycAmlSignOffEvidenceService is registered in Program.cs."
            echo "kyc_available=false" >> "$GITHUB_OUTPUT"
            echo "{\"endpoint\":\"/api/v1/kyc-aml-signoff/initiate\",\"httpStatus\":$KYC_RESP_CODE,\"available\":false}" \
              > ./ProtectedRunEvidence/05a_kyc_aml_check.json
            exit 1
          fi
          echo "{\"endpoint\":\"/api/v1/kyc-aml-signoff/initiate\",\"httpStatus\":$KYC_RESP_CODE,\"available\":true}" \
            > ./ProtectedRunEvidence/05a_kyc_aml_check.json

          # 5b. Compliance case management endpoint reachability
          CASE_RESP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://localhost:7100/api/v1/compliance-cases" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"issuerId\":\"protected-ci-issuer\",\"subjectId\":\"$CORR\",\"caseType\":\"KYC\",\"jurisdiction\":\"CH\"}" \
            2>&1) || CASE_RESP_CODE="000"

          CASE_AVAILABLE="false"
          if [ "$CASE_RESP_CODE" = "200" ] || [ "$CASE_RESP_CODE" = "400" ]; then
            CASE_AVAILABLE="true"
          fi
          echo "  Compliance case endpoint HTTP status : $CASE_RESP_CODE (available=$CASE_AVAILABLE)"
          echo "case_available=$CASE_AVAILABLE" >> "$GITHUB_OUTPUT"

          if [ "$CASE_RESP_CODE" = "404" ] || [ "$CASE_RESP_CODE" = "500" ] || [ "$CASE_RESP_CODE" = "000" ]; then
            echo "❌ Compliance case management endpoint is unavailable (HTTP $CASE_RESP_CODE). Expected 200 or 400."
            echo "  Hint: Verify that IComplianceCaseManagementService is registered in Program.cs."
            echo "case_available=false" >> "$GITHUB_OUTPUT"
            echo "{\"endpoint\":\"/api/v1/compliance-cases\",\"httpStatus\":$CASE_RESP_CODE,\"available\":false}" \
              > ./ProtectedRunEvidence/05b_compliance_case_check.json
            exit 1
          fi
          echo "{\"endpoint\":\"/api/v1/compliance-cases\",\"httpStatus\":$CASE_RESP_CODE,\"available\":true}" \
            > ./ProtectedRunEvidence/05b_compliance_case_check.json

          # 5c. Compliance-aware environment check (compliance workflow check included)
          COMPLIANCE_ENV_RESP=$(curl -sf \
            -X POST "$BASE/environment/check" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"correlationId\":\"$CORR-compliance\",\"includeConfigCheck\":false,\"includeFixtureCheck\":false,\"includeObservabilityCheck\":false,\"includeComplianceWorkflowCheck\":true}" \
            2>&1) || { echo "⚠️  Compliance-aware environment check failed (non-blocking): $COMPLIANCE_ENV_RESP"; COMPLIANCE_ENV_RESP="{}"; }

          echo "$COMPLIANCE_ENV_RESP" | python3 -m json.tool > ./ProtectedRunEvidence/05c_compliance_env_check.json 2>/dev/null \
            || echo "$COMPLIANCE_ENV_RESP" > ./ProtectedRunEvidence/05c_compliance_env_check.json

          COMPLIANCE_ENV_STATUS=$(echo "$COMPLIANCE_ENV_RESP" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "  Compliance-aware environment status : $COMPLIANCE_ENV_STATUS"
          echo "compliance_env_status=$COMPLIANCE_ENV_STATUS" >> "$GITHUB_OUTPUT"

          # ── 6. Extract observed governance status from environment check ──────
          # The WorkflowGovernanceEnabled check outcome is read directly from the
          # API response, not asserted by the workflow.  This ensures the evidence
          # manifest faithfully reflects the runtime configuration of the protected
          # environment rather than a value injected by CI.
          # NOTE: python3 -c code must stay on a single line here (no bare newlines at column 0)
          # to avoid a YAML literal-block-scalar parse error.  Multi-line inline Python that
          # starts at column 0 is seen by the YAML parser as a new mapping key and makes the
          # entire workflow file invalid (conclusion: failure, zero jobs started).
          GOV_CHECK_OUTCOME=$(echo "$ENV_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); checks=d.get('checks',[]); gov=next((c for c in checks if c.get('name')=='WorkflowGovernanceEnabled'),None); print('NotChecked' if gov is None else gov.get('outcome','Unknown'))" 2>/tmp/gov_parse_err) \
            || GOV_CHECK_OUTCOME="ExtractionFailed"
          if [ -f /tmp/gov_parse_err ]; then
            echo "  Warning: governance extraction stderr: $(cat /tmp/gov_parse_err)"
          fi
          echo "  Governance check outcome (observed) : $GOV_CHECK_OUTCOME"
          echo "gov_check_outcome=$GOV_CHECK_OUTCOME" >> "$GITHUB_OUTPUT"

          # ── 7. Write evidence manifest ─────────────────────────────────────
          # isReleaseGradeEvidence: true only when all lifecycle requirements are met
          # under a protected environment with validated secrets.  A value of false means
          # this run MUST NOT be used as product-owner sign-off evidence.
          IS_RELEASE_GRADE="false"
          if [ "$LIFECYCLE_OK" = "true" ] && [ "$ENV_READY" = "true" ] && [ "$KYC_AVAILABLE" = "true" ] && [ "$CASE_AVAILABLE" = "true" ]; then
            IS_RELEASE_GRADE="true"
          fi

          cat > ./ProtectedRunEvidence/00_evidence_manifest.json << MANIFEST
          {
            "schemaVersion": "2.0",
            "correlationId": "$CORR",
            "runId": "${{ github.run_id }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "actor": "${{ github.actor }}",
            "runAt": "$RUN_AT",
            "environmentLabel": "protected-ci",
            "isReleaseGradeEvidence": $IS_RELEASE_GRADE,
            "releaseGradeNote": "true only when lifecycleVerified=true, isReadyForProtectedRun=true, and all compliance APIs are available under the protected-sign-off environment with validated real secrets",
            "observedGovernanceCheckOutcome": "$GOV_CHECK_OUTCOME",
            "results": {
              "environmentStatus": "$ENV_STATUS",
              "isReadyForProtectedRun": $ENV_READY,
              "fixturesProvisioned": $FIXTURE_OK,
              "lifecycleVerified": $LIFECYCLE_OK,
              "reachedStage": "$REACHED_STAGE",
              "diagnosticsOperational": $DIAG_OK,
              "complianceWorkflow": {
                "kycAmlSignOffEndpointAvailable": $KYC_AVAILABLE,
                "complianceCaseEndpointAvailable": $CASE_AVAILABLE,
                "complianceAwareEnvironmentStatus": "$COMPLIANCE_ENV_STATUS"
              }
            }
          }
          MANIFEST

          echo "isReleaseGradeEvidence=$IS_RELEASE_GRADE" >> "$GITHUB_OUTPUT"
          echo "✅ Evidence collection complete (isReleaseGradeEvidence=$IS_RELEASE_GRADE)"

      # ── Step E: Stop backend ────────────────────────────────────────────────
      - name: Stop backend
        if: always() && github.event.inputs.dry_run != 'true' && env.BACKEND_PID != ''
        run: |
          if [ -n "$BACKEND_PID" ]; then
            kill "$BACKEND_PID" 2>/dev/null || true
            echo "Backend process $BACKEND_PID stopped"
          fi

      # ── Step F: Sanitize and publish test results ───────────────────────────
      - name: Sanitize test results
        if: always() && github.event.inputs.dry_run != 'true'
        run: |
          python3 - <<'PY'
          import glob, os, xml.etree.ElementTree as ET
          for path in glob.glob('**/protected-sign-off-tests.trx', recursive=True):
              tree = ET.parse(path)
              for parent in tree.getroot().iter():
                  for child in list(parent):
                      if child.tag.endswith('Output'):
                          parent.remove(child)
              out = os.path.join(os.path.dirname(path), 'protected-sign-off-tests-sanitized.trx')
              tree.write(out, encoding='utf-8', xml_declaration=True)
              print(f"Sanitized {path} -> {out}")
          PY

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && github.event.inputs.dry_run != 'true'
        with:
          files: '**/protected-sign-off-tests-sanitized.trx'
          check_name: 'Protected Sign-Off Test Results'

      # ── Step G: Upload evidence artifact ────────────────────────────────────
      # The artifact name uses the correlation ID when Step 0 succeeded, or falls
      # back to 'blocked-<run_id>-<attempt>' when Step 0 failed.  Either way, the
      # artifact is always uploaded so reviewers have a durable record of the run.
      - name: Upload protected run evidence
        uses: actions/upload-artifact@v7
        if: always() && github.event.inputs.dry_run != 'true'
        with:
          name: protected-sign-off-evidence-${{ steps.setup.outputs.correlation_id || format('blocked-{0}-{1}', github.run_id, github.run_attempt) }}
          path: ./ProtectedRunEvidence/
          retention-days: 90

      - name: Upload test results artifact
        uses: actions/upload-artifact@v7
        if: always() && github.event.inputs.dry_run != 'true'
        with:
          name: protected-sign-off-test-results-${{ steps.setup.outputs.correlation_id }}
          path: ./ProtectedSignOffResults/
          retention-days: 90

      # ── Step H: Produce product-owner sign-off summary ─────────────────────
      - name: Produce sign-off summary
        if: always()
        run: |
          DRY="${{ github.event.inputs.dry_run }}"
          CORR="${{ steps.setup.outputs.correlation_id }}"
          GOV_OUTCOME="${{ steps.evidence.outputs.gov_check_outcome }}"

          echo "## 🔐 Protected Strict Sign-Off Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Correlation ID | \`$CORR\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Run ID | ${{ github.run_id }} (attempt ${{ github.run_attempt }}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch / Ref | \`${{ github.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | protected-ci |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$GOV_OUTCOME" ] && [ "$GOV_OUTCOME" != "NotChecked" ]; then
            [ "$GOV_OUTCOME" = "Pass" ] && GOV_ICON="✅" || GOV_ICON="⚠️"
            echo "| Governance (observed) | ${GOV_ICON} \`$GOV_OUTCOME\` |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$DRY" = "true" ]; then
            echo "### ⚠️  Dry run — endpoint calls skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Prerequisites validated and solution built successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "Re-run with **dry_run=false** to collect live evidence." >> "$GITHUB_STEP_SUMMARY"
          else
            ENV_STATUS="${{ steps.evidence.outputs.env_status }}"
            ENV_READY="${{ steps.evidence.outputs.env_ready }}"
            FIXTURE_OK="${{ steps.evidence.outputs.fixture_ok }}"
            LIFECYCLE_OK="${{ steps.evidence.outputs.lifecycle_ok }}"
            REACHED_STAGE="${{ steps.evidence.outputs.reached_stage }}"
            DIAG_OK="${{ steps.evidence.outputs.diag_ok }}"
            IS_RELEASE_GRADE="${{ steps.evidence.outputs.isReleaseGradeEvidence }}"

            echo "### Evidence Results" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

            [ "$ENV_READY" = "true" ] && ENV_ICON="✅" || ENV_ICON="⚠️"
            echo "| Environment readiness | ${ENV_ICON} \`$ENV_STATUS\` |" >> "$GITHUB_STEP_SUMMARY"

            [ "$FIXTURE_OK" = "true" ] && FIX_ICON="✅" || FIX_ICON="⚠️"
            echo "| Fixture provisioning | ${FIX_ICON} \`$FIXTURE_OK\` |" >> "$GITHUB_STEP_SUMMARY"

            [ "$LIFECYCLE_OK" = "true" ] && LC_ICON="✅" || LC_ICON="❌"
            echo "| Lifecycle verification | ${LC_ICON} reached \`$REACHED_STAGE\` |" >> "$GITHUB_STEP_SUMMARY"

            [ "$DIAG_OK" = "true" ] && DIAG_ICON="✅" || DIAG_ICON="⚠️"
            echo "| Diagnostics operational | ${DIAG_ICON} \`$DIAG_OK\` |" >> "$GITHUB_STEP_SUMMARY"

            KYC_AVAILABLE="${{ steps.evidence.outputs.kyc_available }}"
            CASE_AVAILABLE="${{ steps.evidence.outputs.case_available }}"
            COMPLIANCE_ENV="${{ steps.evidence.outputs.compliance_env_status }}"

            [ "$KYC_AVAILABLE" = "true" ] && KYC_ICON="✅" || KYC_ICON="❌"
            echo "| KYC/AML sign-off endpoint | ${KYC_ICON} \`$KYC_AVAILABLE\` |" >> "$GITHUB_STEP_SUMMARY"

            [ "$CASE_AVAILABLE" = "true" ] && CASE_ICON="✅" || CASE_ICON="❌"
            echo "| Compliance case endpoint | ${CASE_ICON} \`$CASE_AVAILABLE\` |" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$COMPLIANCE_ENV" ] && [ "$COMPLIANCE_ENV" != "UNKNOWN" ]; then
              [ "$COMPLIANCE_ENV" = "Ready" ] && CENV_ICON="✅" || CENV_ICON="⚠️"
              echo "| Compliance workflow health | ${CENV_ICON} \`$COMPLIANCE_ENV\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            [ "$IS_RELEASE_GRADE" = "true" ] && RG_ICON="✅ **YES**" || RG_ICON="❌ **NO**"
            echo "| **isReleaseGradeEvidence** | ${RG_ICON} |" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ "$LIFECYCLE_OK" = "true" ] && [ "$KYC_AVAILABLE" = "true" ] && [ "$CASE_AVAILABLE" = "true" ]; then
              echo "### ✅ Protected run PASSED — Release-Grade Evidence" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "The backend protected sign-off path is **operationally proven** for this commit." >> "$GITHUB_STEP_SUMMARY"
              echo "The evidence manifest \`isReleaseGradeEvidence\` field is \`true\`." >> "$GITHUB_STEP_SUMMARY"
              echo "The compliance workflow APIs (KYC/AML sign-off, compliance case management) are **aligned and accessible**." >> "$GITHUB_STEP_SUMMARY"
              echo "Download the evidence artifact \`protected-sign-off-evidence-${CORR}\` for product-owner sign-off." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "### ❌ Protected run requires attention — NOT release-grade evidence" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              if [ "$LIFECYCLE_OK" != "true" ]; then
                echo "- Lifecycle verification did not reach \`Complete\`." >> "$GITHUB_STEP_SUMMARY"
              fi
              if [ "$KYC_AVAILABLE" != "true" ]; then
                echo "- KYC/AML sign-off endpoint is unavailable (compliance API alignment gap)." >> "$GITHUB_STEP_SUMMARY"
              fi
              if [ "$CASE_AVAILABLE" != "true" ]; then
                echo "- Compliance case management endpoint is unavailable (compliance API alignment gap)." >> "$GITHUB_STEP_SUMMARY"
              fi
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "The evidence manifest \`isReleaseGradeEvidence\` field is \`false\` — this run **cannot** be used for product-owner sign-off." >> "$GITHUB_STEP_SUMMARY"
              echo "Review the evidence artifact and backend logs." >> "$GITHUB_STEP_SUMMARY"
              echo "See [PROTECTED_SIGN_OFF_RUNBOOK.md](./PROTECTED_SIGN_OFF_RUNBOOK.md) for failure remediation." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "_Evidence retained for 90 days. See [PROTECTED_SIGN_OFF_RUNBOOK.md](./PROTECTED_SIGN_OFF_RUNBOOK.md) for interpretation guidance._" >> "$GITHUB_STEP_SUMMARY"

      # ── Step I: Enforce pass on lifecycle result and compliance alignment ──────
      - name: Enforce lifecycle pass (release gate)
        if: github.event.inputs.dry_run != 'true'
        run: |
          LIFECYCLE_OK="${{ steps.evidence.outputs.lifecycle_ok }}"
          KYC_AVAILABLE="${{ steps.evidence.outputs.kyc_available }}"
          CASE_AVAILABLE="${{ steps.evidence.outputs.case_available }}"
          GATE_FAILED=0

          if [ "$LIFECYCLE_OK" != "true" ]; then
            echo "❌ Lifecycle verification failed — protected run does not qualify as a release gate."
            GATE_FAILED=1
          fi

          if [ "$KYC_AVAILABLE" != "true" ]; then
            echo "❌ KYC/AML sign-off endpoint is unavailable — compliance API alignment gap detected."
            echo "  The backend release path is not fully aligned with the enterprise compliance workflow."
            GATE_FAILED=1
          fi

          if [ "$CASE_AVAILABLE" != "true" ]; then
            echo "❌ Compliance case management endpoint is unavailable — compliance API alignment gap detected."
            echo "  The backend release path is not fully aligned with the enterprise compliance workflow."
            GATE_FAILED=1
          fi

          if [ "$GATE_FAILED" -eq 1 ]; then
            echo "See the evidence artifact and PROTECTED_SIGN_OFF_RUNBOOK.md for remediation guidance."
            exit 1
          fi

          echo "✅ Lifecycle verified and compliance workflow APIs aligned — protected run qualifies as a release gate artifact."
