name: Test Pull Request

on:
  pull_request:
    branches:
      - master
      - main
      - 'dependabot/**'
      - 'copilot/**'
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ============================================================
  # JOB 1: Fast PR tests — only tests affected by the diff
  # Target: < 10 minutes. Runs on pull_request events only.
  # ============================================================
  pr-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for accurate diff

      - name: Get changed files
        uses: tj-actions/changed-files@v47
        id: changed-files

      - name: Determine test filter from changed files
        id: test-filter
        run: |
          set -euo pipefail

          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Changed files: $CHANGED_FILES"

          # ── Detect infrastructure changes that require the full suite ──
          INFRA_CHANGED=false
          for f in $CHANGED_FILES; do
            case "$f" in
              *.csproj|*.sln|*.props|*.targets|Directory.Build.*|global.json|NuGet.Config|coverage.runsettings)
                INFRA_CHANGED=true ;;
              BiatecTokensApi/Program.cs|BiatecTokensApi/Startup.cs)
                INFRA_CHANGED=true ;;
            esac
          done

          if [ "$INFRA_CHANGED" = true ]; then
            echo "⚠️  Infrastructure files changed — running full test suite"
            echo "TEST_FILTER=FullyQualifiedName!~RealEndpoint" >> "$GITHUB_OUTPUT"
            echo "SELECTIVE=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Collect test class names to run ──
          TEST_CLASSES=""

          # 1. Directly changed test files → always run them
          for f in $CHANGED_FILES; do
            case "$f" in
              BiatecTokensTests/*.cs)
                CLASS=$(basename "$f" .cs)
                TEST_CLASSES="$TEST_CLASSES $CLASS"
                ;;
            esac
          done

          # 2. Changed source files → find matching test files by base name
          for f in $CHANGED_FILES; do
            case "$f" in
              BiatecTokensApi/*.cs)
                BASE=$(basename "$f" .cs)
                # Search for test files whose name contains the source file's base name
                MATCHES=$(find BiatecTokensTests -maxdepth 1 -name "*${BASE}*Tests.cs" -o -name "*${BASE}*Test.cs" 2>/dev/null || true)
                for m in $MATCHES; do
                  CLASS=$(basename "$m" .cs)
                  TEST_CLASSES="$TEST_CLASSES $CLASS"
                done
                ;;
            esac
          done

          # 3. Deduplicate
          TEST_CLASSES=$(echo "$TEST_CLASSES" | tr ' ' '\n' | sort -u | grep -v '^$' || true)

          # Count non-empty class names.
          # NOTE: Do NOT use `grep -c expr || echo 0` here.
          # `grep -c` writes the count to stdout before it exits non-zero (no matches),
          # so when grep exits 1, the `|| echo 0` fallback also runs, producing two
          # separate output lines — "0\n0" — a two-line string that bash integer
          # comparisons cannot parse.  Both `[ "$COUNT" -eq 0 ]` and
          # `[ "$COUNT" -gt 60 ]` fail silently, the else branch runs with an empty
          # TEST_CLASSES variable, and FILTER becomes "()" — an invalid dotnet test
          # filter expression that crashes the test runner.  Use a simple counter loop
          # instead: it never produces output and COUNT stays a clean integer.
          COUNT=0
          for _tc in $TEST_CLASSES; do COUNT=$((COUNT + 1)); done

          echo "Matched $COUNT test class(es)"
          echo "$TEST_CLASSES"

          # 4. Build the --filter expression
          if [ "$COUNT" -eq 0 ]; then
            # No code changes or no matching tests — run a minimal smoke-test set
            echo "ℹ️  No matching test classes — running smoke tests only"
            echo "TEST_FILTER=(FullyQualifiedName~HealthCheck | FullyQualifiedName~SwaggerSpec | FullyQualifiedName~ApiIntegration) & FullyQualifiedName!~RealEndpoint" >> "$GITHUB_OUTPUT"
            echo "SELECTIVE=true" >> "$GITHUB_OUTPUT"
          elif [ "$COUNT" -gt 60 ]; then
            # Too many matches — likely a broad refactor; run everything
            echo "⚠️  $COUNT test classes matched — running full suite"
            echo "TEST_FILTER=FullyQualifiedName!~RealEndpoint" >> "$GITHUB_OUTPUT"
            echo "SELECTIVE=false" >> "$GITHUB_OUTPUT"
          else
            FILTER=""
            for CLASS in $TEST_CLASSES; do
              if [ -n "$FILTER" ]; then
                FILTER="$FILTER | FullyQualifiedName~$CLASS"
              else
                FILTER="FullyQualifiedName~$CLASS"
              fi
            done
            FILTER="($FILTER) & FullyQualifiedName!~RealEndpoint"
            echo "TEST_FILTER=$FILTER" >> "$GITHUB_OUTPUT"
            echo "SELECTIVE=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BiatecTokensApi.sln

      - name: Build solution
        run: dotnet build BiatecTokensApi.sln --configuration Release --no-restore

      - name: Run tests (selective)
        run: |
          echo "::group::Test filter"
          echo "${{ steps.test-filter.outputs.TEST_FILTER }}"
          echo "::endgroup::"

          dotnet test BiatecTokensTests/BiatecTokensTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "${{ steps.test-filter.outputs.TEST_FILTER }}" \
            --results-directory ./TestResults \
            --blame-hang-timeout 60s
        timeout-minutes: 90
        

      - name: Sanitize test results for publish
        if: always()
        run: |
          python3 - <<'PY'
          import glob, os, xml.etree.ElementTree as ET
          for path in glob.glob('**/test-results.trx', recursive=True):
              tree = ET.parse(path)
              for parent in tree.getroot().iter():
                  for child in list(parent):
                      if child.tag.endswith('Output'):
                          parent.remove(child)
              out = os.path.join(os.path.dirname(path), 'test-results-sanitized.trx')
              tree.write(out, encoding='utf-8', xml_declaration=True)
              print(f"Sanitized {path} -> {out}")
          PY

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        continue-on-error: true  # Required: prevents 403 from PR comment posting cascading into job failure
        with:
          files: '**/test-results-sanitized.trx'
          check_name: 'PR Test Results'

      - name: Post summary
        if: always()
        run: |
          echo "## PR Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test-filter.outputs.SELECTIVE }}" = "true" ]; then
            echo "🎯 **Selective run** — only tests affected by the PR diff were executed." >> $GITHUB_STEP_SUMMARY
          else
            echo "🔄 **Full run** — infrastructure or broad changes detected; all tests executed." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Filter: \`${{ steps.test-filter.outputs.TEST_FILTER }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR
        if: github.actor != 'dependabot[bot]' && always()
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const selective = '${{ steps.test-filter.outputs.SELECTIVE }}' === 'true';
            const mode = selective ? '🎯 Selective (changed files only)' : '🔄 Full suite';
            const body = `✅ PR tests completed!\n\n**Test mode**: ${mode}\n\n` +
              `> Full coverage & OpenAPI generation run on merge to main.`;
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } catch (e) {
              console.log('Unable to comment:', e.message);
            }

  # ============================================================
  # JOB 2: Full test suite — runs on push to main/master only
  # Includes coverage reporting and OpenAPI generation.
  # ============================================================
  full-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BiatecTokensApi.sln

      - name: Build solution
        run: dotnet build BiatecTokensApi.sln --configuration Release --no-restore

      - name: Run full test suite
        run: |
          dotnet test BiatecTokensTests/BiatecTokensTests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --settings coverage.runsettings \
            --filter "FullyQualifiedName!~RealEndpoint" \
            --results-directory ./TestResults \
            --blame-hang-timeout 120s \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool || true

      - name: Generate coverage report
        run: |
          reportgenerator \
            "-reports:./TestResults/*/coverage.opencover.xml" \
            "-targetdir:./CoverageReport" \
            "-reporttypes:Html;Cobertura;TextSummary" \
            "-verbosity:Info"

      - name: Display coverage summary
        run: |
          echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ./CoverageReport/Summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check coverage thresholds
        run: |
          LINE_RATE=$(grep -oP 'line-rate="\K[0-9.]+' ./CoverageReport/Cobertura.xml | head -1)
          BRANCH_RATE=$(grep -oP 'branch-rate="\K[0-9.]+' ./CoverageReport/Cobertura.xml | head -1)

          LINE_PERCENT=$(echo "$LINE_RATE * 100" | bc)
          BRANCH_PERCENT=$(echo "$BRANCH_RATE * 100" | bc)

          echo "Line Coverage: ${LINE_PERCENT}%"
          echo "Branch Coverage: ${BRANCH_PERCENT}%"

          THRESHOLD_LINE=15
          THRESHOLD_BRANCH=8

          LINE_PASS=$(echo "$LINE_PERCENT >= $THRESHOLD_LINE" | bc -l)
          BRANCH_PASS=$(echo "$BRANCH_PERCENT >= $THRESHOLD_BRANCH" | bc -l)

          if [ "$LINE_PASS" -eq 0 ]; then
            echo "❌ Line coverage ${LINE_PERCENT}% is below threshold of ${THRESHOLD_LINE}%"
            exit 1
          fi

          if [ "$BRANCH_PASS" -eq 0 ]; then
            echo "❌ Branch coverage ${BRANCH_PERCENT}% is below threshold of ${THRESHOLD_BRANCH}%"
            exit 1
          fi

          echo "✅ Coverage OK: Line ${LINE_PERCENT}% (≥${THRESHOLD_LINE}%), Branch ${BRANCH_PERCENT}% (≥${THRESHOLD_BRANCH}%)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 30

      - name: Sanitize test results for publish
        if: always()
        run: |
          python3 - <<'PY'
          import glob, os, xml.etree.ElementTree as ET
          for path in glob.glob('**/test-results.trx', recursive=True):
              tree = ET.parse(path)
              for parent in tree.getroot().iter():
                  for child in list(parent):
                      if child.tag.endswith('Output'):
                          parent.remove(child)
              out = os.path.join(os.path.dirname(path), 'test-results-sanitized.trx')
              tree.write(out, encoding='utf-8', xml_declaration=True)
              print(f"Sanitized {path} -> {out}")
          PY

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/test-results-sanitized.trx'
          check_name: 'Test Results'

      - name: Generate OpenAPI Specification
        run: |
          dotnet tool install --global Swashbuckle.AspNetCore.Cli --version 6.8.1 || true

          cat > BiatecTokensApi/appsettings.OpenAPI.json << 'EOF'
          {
            "App": {
              "Account": "test mnemonic for ci openapi generation only not real secret"
            },
            "AlgorandAuthentication": {
              "Realm": "BiatecTokens#ARC14",
              "CheckExpiration": false,
              "Debug": true,
              "AllowedNetworks": {}
            },
            "IPFSConfig": {
              "ApiUrl": "https://ipfs-api.biatec.io",
              "GatewayUrl": "https://ipfs.biatec.io/ipfs",
              "TimeoutSeconds": 30,
              "MaxFileSizeBytes": 10485760,
              "ValidateContentHash": true
            },
            "EVMChains": [
              {
                "RpcUrl": "https://mainnet.base.org",
                "ChainId": 8453,
                "GasLimit": 4500000
              }
            ],
            "KeyManagementConfig": {
              "Provider": "Hardcoded",
              "HardcodedKey": "TestKeyForCIOpenAPIGenerationOnly32CharactersMinimum"
            },
            "WorkflowGovernanceConfig": {
              "Enabled": true,
              "EnforceValidation": true,
              "EnforcePreconditions": true,
              "EnforcePostCommitVerification": true,
              "MaxRetryAttempts": 5,
              "PolicyVersion": "1.0.0",
              "RolloutPercentage": 100
            },
            "DeploymentEvidenceConfig": {
              "Provider": "Simulation",
              "Algorand": {
                "IndexerUrl": "",
                "ApiToken": "",
                "TimeoutSeconds": 15,
                "MaxRetries": 2
              }
            }
          }
          EOF

          export ASPNETCORE_ENVIRONMENT="OpenAPI"
          swagger tofile --output ./openapi.json BiatecTokensApi/bin/Release/net10.0/BiatecTokensApi.dll v1 2>&1 || {
            echo "⚠️ OpenAPI generation failed — placeholder created"
            echo '{"info": {"title": "BiatecTokens API", "version": "v1"}, "note": "Available at /swagger/v1/swagger.json when running"}' > ./openapi.json
          }

          rm -f BiatecTokensApi/appsettings.OpenAPI.json

      - name: Upload OpenAPI Specification
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: openapi-specification
          path: openapi.json
          retention-days: 90